<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI文章判定実験</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>AI文章判定実験</h1>

    <h3 id="questionNumber">
        問題 1 / 3
    </h3>

    <div class="textBox">

        <h2>文章A</h2>

        <p id="textA">

        </p>

    </div>


    <div class="textBox">

        <h2>文章B</h2>

        <p id="textB">

        </p>

    </div>


    <h3>

        次の2つの文章のうち、AIが生成したと思う文章を選択してください


    </h3>


    <button id="buttonA">
        A
    </button>


    <button id="buttonB">
        B
    </button>

    <div id="reasonArea" style="display:none;">

    <h3>そのように判断した理由として、最も当てはまるものを選択してください。(複数回答可)</h3>

    <div class="reasonList">

        <label><input type="checkbox" name="reason" value="句読点">句読点の使い方にAIっぽさを感じた（、 。）</label>

        <label><input type="checkbox" name="reason" value="語彙">語彙の選び方にAIっぽさを感じた（特定の文言、専門用語など）</label>

        <label><input type="checkbox" name="reason" value="文法">文法や助詞の使い方にAIっぽさを感じた（接続詞の使い方、助詞「は」「が」「など」の使い方）</label>

        <label><input type="checkbox" name="reason" value="内容">内容や論理展開にAIっぽさを感じた</label>

        <label><input type="checkbox" name="reason" value="直感">全体的な印象（直感）で判断した</label>

        <label><input type="checkbox" name="reason" value="その他">その他</label>

    </div>

    <button id="nextButton">次へ</button>

    <br><br>

    <button id="stopButton">
        中断
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
