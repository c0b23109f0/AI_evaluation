<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI文章判定実験</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>AI文章判定実験</h1>

    <h3 id="questionNumber">
        問題 1 / 3
    </h3>

    <div class="textBox">

        <h2>文章A</h2>

        <p id="textA">

        </p>

    </div>


    <div class="textBox">

        <h2>文章B</h2>

        <p id="textB">

        </p>

    </div>


    <h3>

        次の2つの文章のうち、AIが生成したと思う文章を選択してください


    </h3>


    <button id="buttonA">
        A
    </button>


    <button id="buttonB">
        B
    </button>

    <div id="reasonArea" style="display:none;">

        <h3>そのように判断した理由として最も当てはまるものを1つ選択してください</h3>

        <label>
            <input type="radio" name="reason" value="文体が機械的">
            文体が機械的
        </label><br>

        <label>
            <input type="radio" name="reason" value="語彙が不自然">
            語彙が不自然
        </label><br>

        <label>
            <input type="radio" name="reason" value="文法がおかしい">
            文法がおかしい
        </label><br>

        <label>
            <input type="radio" name="reason" value="内容が不自然">
            内容が不自然
        </label><br>

        <label>
            <input type="radio" name="reason" value="なんとなく">
            なんとなく
        </label><br><br>

        <button id="nextButton">
            次へ
        </button>

    </div>
    <br><br>

    <button id="stopButton">
        中断
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
